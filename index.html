    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      text-align: center;
      background: linear-gradient(-45deg, #74ebd5, #9face6, #ff9a9e, #fad0c4);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      transition: 0.5s;
    }

    body.dark { background: #121212; color: #f1f1f1; }

    @keyframes gradientBG {
      0% { background-position: 0% }
      50% { background-position: 100% }
      100% { background-position: 0% }
    }

    header {
      background: linear-gradient(135deg, #1f2a44, #3f72af);
      color: white;
      padding: 30px;
    }

    .typing {
      font-size: 28px;
      border-right: 3px solid white;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(20), blink .7s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    .top-actions {
      position: absolute;
      top: 10px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
    }

    .tab-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 15px;
    }

    .tab-buttons button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .active-btn { background: linear-gradient(135deg, #ff7e5f, #feb47b); }

    .tab-content {
      display: none;
      background: rgba(255,255,255,0.95);
      margin: 20px auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 15px;
    }

    body.dark .tab-content { background: #1e1e1e; }

    .active { display: block; }

      background: #fff;
      margin: 15px 0;
      padding: 15px;
      border-radius: 10px;
    }
